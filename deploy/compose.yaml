# lupira-cal-api — TrueNAS Custom App `lupira-cal-api`.
# Single .NET 10 service: REST + MCP (/api) and CalDAV/CardDAV (/dav) over one Postgres (lupira_cal). No filesystem state.
services:
  lupira-cal-api:
    image: danbro96/lupira-cal-api:${IMAGE_TAG:-latest}
    container_name: lupira-cal-api
    environment:
      # Postgres — EF Core source of truth (schema `cal`). Both /api and /dav read/write this one DB.
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=lupira_cal;Username=lupira_cal_user;Password=${LUPIRA_CAL_DB_PASSWORD:?required}"

      # /api auth — Authentik OIDC (JWT). The headless agent obtains a member-scoped token via
      # token-exchange (RFC 8693) at Authentik — no agent secret lives here.
      Auth__Authority: ${AUTH_AUTHORITY:-https://auth.lupira.com/application/o/lupira-cal/}
      Auth__Audience: ${AUTH_AUDIENCE:-lupira-cal}

      # /dav auth — Basic -> LDAP bind against the Authentik LDAP outpost (reused from the Radicale plan).
      Ldap__Uri: ${LDAP_URI:-ldap://authentik-ldap:3389}
      Ldap__BaseDn: dc=ldap,dc=goauthentik,dc=io
      Ldap__ReaderDn: cn=ldapservice,ou=users,dc=ldap,dc=goauthentik,dc=io
      Ldap__ReaderSecret: ${LUPIRA_CAL_LDAP_SECRET:?required}
      Ldap__Filter: "(&(objectClass=user)(mail={0}))"   # login by email

      # MCP surface (/api/mcp) is LAN/WireGuard-only — it is NOT added to the Cloudflare Tunnel.

      # OTEL — same Basic Auth header convention as the other .NET apps (http/protobuf; 5-min metric cadence).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod,host.name=medelynas,service.name=lupira-cal-api}
    ports:
      - "${HOST_PORT:-40880}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - default
      - medelynas_data         # Postgres + authentik-ldap:3389
      - medelynas_telemetry    # OTel collector
networks:
  default:
    driver: bridge
  medelynas_data:
    external: true
    name: medelynas_data
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
