# Reference Compose stack for LupiraCalApi.
# Two .NET 10 services over one Postgres, no filesystem state:
#   lupira-cal-api    — REST at root + MCP (/mcp) and CalDAV/CardDAV (/dav); materializes cal.scheduled_fire.
#   lupira-cal-worker — the fire dispatcher: claims due rows and pushes them to assistant-api POST /fires.
#
# Every host, port, and identity-provider URL below is an OVERRIDABLE SAMPLE wired to a ${VAR:-default}
# env var — the defaults are illustrative, not required. Set them for your own environment.
services:
  lupira-cal-api:
    image: danbro96/lupira-cal-api:${IMAGE_TAG:-latest}
    container_name: lupira-cal-api
    environment:
      # Postgres — the Marten event store + documents (one schema). Both the REST surface and /dav read/write this one DB.
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=lupira_cal;Username=lupira_cal_user;Password=${LUPIRA_CAL_DB_PASSWORD:?required}"

      # REST auth — OIDC (JWT). The service only validates tokens (issuer + audience); no client secret
      # lives here. Any OIDC provider works — the default is just a sample issuer URL.
      Auth__Authority: ${AUTH_AUTHORITY:-https://auth.lupira.com/application/o/lupira-cal/}
      Auth__Audience: ${AUTH_AUDIENCE:-lupira-cal}

      # /dav auth — HTTP Basic resolved by an LDAP search+bind. Point Ldap__* at your directory.
      Ldap__Uri: ${LDAP_URI:-ldap://authentik-ldap:3389}
      Ldap__BaseDn: dc=ldap,dc=goauthentik,dc=io
      Ldap__ReaderDn: cn=ldapservice,ou=users,dc=ldap,dc=goauthentik,dc=io
      Ldap__ReaderSecret: ${LUPIRA_CAL_LDAP_SECRET:?required}
      Ldap__Filter: "(&(objectClass=user)(mail={0}))"   # login by email

      # Gazetteer — cal delegates free-text location resolution to LupiraGeoApi (client-credentials, aud lupira-geo)
      # storing the geo place id + a denormalized label on the item. Set GEO_CLIENT_SECRET to authenticate; clear GEO_BASE_URL to disable.
      Geo__BaseUrl: ${GEO_BASE_URL:-http://lupira-geo-api:8080/}   # in-network hop, not the public tunnel URL
      Geo__TokenUrl: ${GEO_TOKEN_URL:-https://auth.lupira.com/application/o/token/}
      Geo__ClientId: ${GEO_CLIENT_ID:-lupira-geo-svc}
      Geo__ClientSecret: ${GEO_CLIENT_SECRET:-}
      Geo__Scope: ${GEO_SCOPE:-lupira-geo-aud}

      # MCP surface (/mcp) is the most powerful surface — keep it off the public internet.

      # OTEL — optional OTLP export (http/protobuf; 5-min metric cadence). Unset endpoint = silent no-op.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod}
    ports:
      - "${HOST_PORT:-40880}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - default
      - medelynas_data         # Postgres + authentik-ldap:3389
      - medelynas_telemetry    # OTel collector

  lupira-cal-worker:
    image: danbro96/lupira-cal-worker:${IMAGE_TAG:-latest}
    container_name: lupira-cal-worker
    environment:
      # Same DB/role as the API — the worker claims cal.scheduled_fire rows and reads the item aggregates.
      ConnectionStrings__Postgres: "Host=postgres;Port=5432;Database=lupira_cal;Username=lupira_cal_user;Password=${LUPIRA_CAL_DB_PASSWORD:?required}"

      # assistant-api hop — service-authed push to POST /fires. Client-credentials against Authentik in prod;
      # the client's audience must be the assistant's internal one (lupira-assistant-internal).
      Assistant__BaseUrl: ${ASSISTANT_BASE_URL:-https://assistant-api.lupira.com/}
      Assistant__TokenUrl: ${ASSISTANT_TOKEN_URL:-https://auth.lupira.com/application/o/token/}
      Assistant__ClientId: ${ASSISTANT_CLIENT_ID:?required}
      Assistant__ClientSecret: ${ASSISTANT_CLIENT_SECRET:?required}

      # OTEL — optional OTLP export. Unset endpoint = silent no-op.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
      OTEL_METRIC_EXPORT_INTERVAL: ${OTEL_METRIC_EXPORT_INTERVAL:-300000}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-deployment.environment=prod}
    # No host port — stack-local /livez only.
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/livez || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - default
      - medelynas_data         # Postgres + assistant-api + Authentik over LAN
      - medelynas_telemetry    # OTel collector
networks:
  default:
    driver: bridge
  medelynas_data:
    external: true
    name: medelynas_data
  medelynas_telemetry:
    external: true
    name: medelynas_telemetry
